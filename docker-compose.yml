services:
  uniapi-status:
    # 使用自己 fork 构建的镜像：把用户名换成你的 Docker Hub 账户即可
    image: lkw123/uni-api-status:latest
    container_name: uniapi-status
    restart: unless-stopped
    ports:
      # 宿主机端口:容器端口。若 3000 被占用，改左侧，如 "8080:3000"
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 容器内路径，与下方 volumes 挂载点对应
      - API_YAML_PATH=/app/data/api.yaml
      - STATS_DB_TYPE=sqlite
      - STATS_DB_PATH=/app/data/stats.db
      # 使用 PostgreSQL 时改用以下变量（并把 STATS_DB_TYPE 设为 postgres）：
      # - STATS_DB_TYPE=postgres
      # - STATS_DB_HOST=your_postgres_host
      # - STATS_DB_PORT=5432
      # - STATS_DB_USER=your_postgres_user
      # - STATS_DB_PASSWORD=your_postgres_password
      # - STATS_DB_NAME=your_uniapi_database
    volumes:
      # 把 uni-api 的数据目录（同时包含 api.yaml 与 stats.db）挂载进来。
      # 注意：配置编辑器需要写 api.yaml；SQLite 处于 WAL 模式时读取也需要目录可写，
      # 因此请勿使用 :ro。SELinux 环境下可在末尾加 :z。
      - /path/to/your/uniapi/data:/app/data
      # 若 api.yaml 与 stats.db 不在同一目录，可分别挂载并相应调整上面的 *_PATH：
      # - /path/to/your/uniapi/api.yaml:/app/data/api.yaml
